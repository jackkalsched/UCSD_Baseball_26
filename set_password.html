<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password - UCSD Baseball</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
    <script src="js/auth.js"></script>
    <script>checkAuth();</script>
    <style>
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card { width: 100%; max-width: 450px; padding: 3rem 2rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-muted); }
        .form-control { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: var(--text-light); font-family: inherit; }
        .btn-block { width: 100%; margin-top: 1rem; }
        .flashes { list-style: none; margin-bottom: 1.5rem; padding: 1rem; border-radius: 8px; display: none; }
        .flashes.error { color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
        .flashes.success { color: #22c55e; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); }
        .invite-info { background: rgba(0, 98, 155, 0.15); border: 1px solid rgba(0, 98, 155, 0.3); padding: 1rem; border-radius: 8px; margin-bottom: 2rem; text-align: left; }
        .invite-info strong { color: var(--text-light); }
    </style>
</head>
<body>
    <div class="background-decor"></div>
    <div class="container auth-container">
        <div class="glass-panel auth-card">
            <h2 style="color: var(--text-light); margin-bottom: 1.5rem;">Welcome to the Team</h2>
            
            <div class="invite-info" id="invite-box" style="display:none;">
                <p>You have been invited to join the UCSD Baseball Portal.</p>
                <p style="margin-top: 0.5rem;">Your User ID: <strong id="lbl-uid"></strong></p>
                <p>Your Role: <strong id="lbl-role" style="text-transform: capitalize;"></strong></p>
            </div>

            <ul class="flashes error" id="error-msg"><li></li></ul>
            <ul class="flashes success" id="success-msg"><li>Password set successfully! Redirecting...</li></ul>

            <form id="set-form">
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6">
                </div>
                <button type="submit" class="primary-btn btn-block">Set Password</button>
            </form>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('error-msg').innerHTML = "<li>Invalid or missing invite link!</li>";
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('set-form').style.display = 'none';
        } else {
            try {
                const p = JSON.parse(atob(token));
                document.getElementById('lbl-uid').textContent = p.userId;
                document.getElementById('lbl-role').textContent = p.role;
                document.getElementById('invite-box').style.display = 'block';
            } catch(e) {
                document.getElementById('error-msg').innerHTML = "<li>Corrupted invite link!</li>";
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('set-form').style.display = 'none';
            }
        }

        document.getElementById('set-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('confirm_password').value;
            const err = document.getElementById('error-msg');
            err.style.display = 'none';

            if(p1 !== p2) {
                err.innerHTML = "<li>Passwords do not match</li>";
                err.style.display = 'block';
                return;
            }
            if(setPassword(token, p1)) {
                document.getElementById('set-form').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                setTimeout(() => window.location.href = getBaseUrl() + 'login.html', 1500);
            } else {
                err.innerHTML = "<li>Failed to set password.</li>";
                err.style.display = 'block';
            }
        });
    </script>
</body>
</html>
