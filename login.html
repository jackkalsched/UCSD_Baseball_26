<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UCSD Baseball Internal Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
    <script src="js/auth.js"></script>
    <script>checkAuth();</script>
    <style>
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card { width: 100%; max-width: 400px; padding: 3rem 2rem; text-align: center; }
        .auth-card h2 { margin-bottom: 2rem; color: var(--secondary-color); }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-muted); }
        .form-control { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: var(--text-light); font-family: inherit; }
        .form-control:focus { outline: none; border-color: var(--primary-color); }
        .btn-block { width: 100%; margin-top: 1rem; }
        .flashes { list-style: none; margin-bottom: 1.5rem; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 1rem; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); display: none; }
    </style>
</head>
<body>
    <div class="background-decor"></div>
    <div class="container auth-container">
        <div class="glass-panel auth-card">
            <h2>UCSD Baseball Portal</h2>
            <ul class="flashes" id="error-msg"><li>Invalid User ID or Password</li></ul>

            <form id="login-form">
                <div class="form-group">
                    <label for="user_id">User ID</label>
                    <input type="text" id="user_id" name="user_id" class="form-control" placeholder="e.g. JDoe" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="primary-btn btn-block">Log In</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('user_id').value;
            const p = document.getElementById('password').value;
            if(login(u, p)) {
                window.location.href = getBaseUrl() + 'index.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
