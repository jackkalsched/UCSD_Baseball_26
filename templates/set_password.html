<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password - UCSD Baseball</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            font-family: inherit;
        }
        .btn-block {
            width: 100%;
            margin-top: 1rem;
        }
        .flashes {
            list-style: none;
            margin-bottom: 1.5rem;
            color: #ef4444; 
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 8px;
        }
        .invite-info {
            background: rgba(0, 98, 155, 0.15);
            border: 1px solid rgba(0, 98, 155, 0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: left;
        }
        .invite-info strong {
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="background-decor"></div>
    <div class="container auth-container">
        <div class="glass-panel auth-card">
            <h2 style="color: var(--text-light); margin-bottom: 1.5rem;">Welcome to the Team</h2>
            
            <div class="invite-info">
                <p>You have been invited to join the UCSD Baseball Portal.</p>
                <p style="margin-top: 0.5rem;">Your User ID: <strong>{{ user_id }}</strong></p>
                <p>Your Role: <strong>{{ role }}</strong></p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <ul class="flashes">
                {% for message in messages %}
                  <li>{{ message }}</li>
                {% endfor %}
                </ul>
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6">
                </div>
                <button type="submit" class="primary-btn btn-block">Set Password</button>
            </form>
        </div>
    </div>
</body>
</html>
