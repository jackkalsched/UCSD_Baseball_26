<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster — UCSD Baseball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css?v=2">
    <script src="js/auth.js?v=2"></script>
    <script>checkAuth();</script>
    <style>
        .roster-section { margin-bottom: 2.5rem; }
        .roster-section h2 {
            font-size: 1.3rem;
            color: var(--secondary-color);
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
            gap: 1.25rem;
        }

        .roster-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.25rem 1rem 1rem;
            text-align: center;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .roster-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        .roster-photo-wrap {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 0.75rem;
        }
        .roster-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top;
        }
        .roster-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: rgba(255,255,255,0.92);
        }
        .roster-number {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: var(--secondary-color);
            color: var(--bg-dark);
            font-size: 0.68rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            line-height: 1.4;
        }

        .roster-card-info { width: 100%; }

        .roster-name {
            display: block;
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text-color);
            text-decoration: none;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }
        .roster-name:hover { color: var(--secondary-color); }

        .roster-meta {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .roster-position {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--secondary-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .roster-year {
            font-size: 0.72rem;
            color: var(--text-muted);
        }
        .roster-hometown {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }

        @media (max-width: 600px) {
            .roster-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="background-decor"></div>
    <div class="container" style="max-width: 1200px;">
        <header class="glass-panel">
            <div class="logo">
                <a href="index.html" style="text-decoration:none;color:inherit;"><h1>UCSD Baseball</h1></a>
            </div>
            <nav>
                <ul style="align-items: center;">
                    <li><a href="index.html">Dashboard</a></li>
                    <li id="nav-roster"><a href="roster.html" class="active">Roster</a></li>
                    <li><a href="#">Schedule</a></li>
                    <li><a href="player_analytics.html">Analytics</a></li>
                    <li><a href="#" onclick="logout();return false;" style="color:var(--secondary-color);margin-left:1rem;">Logout</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="card glass-panel" style="padding: 1.5rem;">
                <h2 style="margin-bottom: 1.75rem;">2026 Roster</h2>

                <div id="roster-loading" style="color: var(--secondary-color);">Loading roster…</div>
                <div id="roster-error" class="hidden" style="color: #ff6b6b;"></div>

                <div id="roster-content" class="hidden">
                    <div class="roster-section">
                        <h2>Position Players</h2>
                        <div id="hitters-grid" class="roster-grid"></div>
                    </div>
                    <div class="roster-section">
                        <h2>Pitchers</h2>
                        <div id="pitchers-grid" class="roster-grid"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/roster.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            initRoster();
        });
    </script>
</body>
</html>
